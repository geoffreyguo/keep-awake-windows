name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: 同步项目依赖
        run: uv sync
      - name: 使用 PyInstaller 打包为 EXE
        run: uv run pyinstaller --noconsole --onefile keep_awake.py
      - name: 上传 EXE 文件
        uses: actions/upload-artifact@v4
        with:
          name: KeepAwake-Windows
          path: dist/keep_awake.exe
